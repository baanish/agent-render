services:
  agent-render:
    build:
      context: ..
      dockerfile: selfhosted/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - agent-render-data:/app/data
    environment:
      - PORT=3000
      - DB_PATH=/app/data/agent-render.db
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  agent-render-data:
